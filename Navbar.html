<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Liquid Glass Navbar</title>

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Scope styles to navbar only (Elementor-safe) */
      .navbar-wrapper,
      .navbar-wrapper * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
      }

      .navbar-wrapper a {
        text-decoration: none;
      }

      /* =========================
       NAVBAR
    ========================== */

      .navbar-wrapper {
        width: 100%;
        padding: 18px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 999;

        transition: padding 0.28s ease;
      }

      .navbar-wrapper.is-scrolled {
        padding: 10px;
      }

      .navbar {
        width: 100%;
        max-width: 1320px;
        margin: auto;

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 12px 22px;

        border-radius: 9999px;

        transition:
          padding 0.28s ease,
          max-width 0.28s ease;

        /* LIQUID GLASS */
        background: rgba(255, 255, 255, 0.18);

        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);

        border: 1px solid rgba(255, 255, 255, 0.35);

        box-shadow:
          0 8px 32px rgba(31, 38, 135, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
      }

      .navbar-wrapper.is-scrolled .navbar {
        max-width: 1180px;
        padding: 8px 14px;
      }

      /* =========================
       LOGO
    ========================== */

      .logo img {
        width: 260px;
        object-fit: contain;
        display: block;
      }

      /* =========================
       MENU
    ========================== */

      .nav-menu {
        display: flex;
        align-items: center;
        gap: 34px;
        list-style: none;
      }

      .nav-item {
        position: relative;
      }

      .nav-link {
        color: #2d2355;
        font-size: 15px;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .nav-caret {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        display: inline-block;
        pointer-events: none;
      }

      .nav-caret path {
        stroke: currentColor;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .nav-link:hover {
        color: #4a5a8d;
      }

      /* =========================
       DROPDOWN
    ========================== */

      .dropdown {
        position: absolute;
        top: 180%;
        left: 0;

        z-index: 1000;

        min-width: 240px;

        padding: 14px;

        border-radius: 22px;

        background: rgba(255, 255, 255, 0.16);

        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);

        border: 1px solid rgba(255, 255, 255, 0.28);

        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.12);

        opacity: 0;
        visibility: hidden;
        transform: translateY(12px);

        transition: 0.35s ease;
      }

      .nav-item:hover .dropdown {
        background: rgba(255, 255, 255, 0.92);
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .dropdown a {
        display: block;
        padding: 12px 14px;

        border-radius: 14px;

        color: #2d2355;
        font-size: 14px;
        font-weight: 500;

        transition: 0.25s;
      }

      .dropdown a:hover {
        background: rgba(255, 255, 255, 0.22);
        color: #4a5a8d;
        transform: translateX(4px);
      }

      /* =========================
       MOBILE BUTTON
    ========================== */

      .menu-toggle {
        display: none;
        cursor: pointer;

        background: transparent;
        border: 0;
        padding: 6px;
        line-height: 0;
      }

      .menu-toggle svg {
        width: 30px;
        height: 30px;
        display: block;
      }

      .menu-toggle svg path {
        stroke: #2d2355;
        stroke-width: 3;
        stroke-linecap: round;
        fill: none;
      }

      /* =========================
       MOBILE
    ========================== */

      @media (max-width: 992px) {
        .navbar {
          padding: 10px 14px;
          max-width: 100%;
        }

        .navbar-wrapper {
          padding: 12px;
        }

        .navbar-wrapper.is-scrolled {
          padding: 8px 12px;
        }

        .navbar-wrapper.is-scrolled .navbar {
          max-width: 100%;
        }

        .logo img {
          width: 200px;
        }

        .menu-toggle {
          display: flex;
        }

        .nav-menu {
          position: absolute;

          top: 110%;
          left: 20px;
          right: 20px;

          flex-direction: column;
          align-items: flex-start;

          padding: 24px;

          border-radius: 24px;

          background: rgba(255, 255, 255, 0.18);

          backdrop-filter: blur(18px);
          -webkit-backdrop-filter: blur(18px);

          border: 1px solid rgba(255, 255, 255, 0.25);

          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);

          opacity: 0;
          visibility: hidden;
          transform: translateY(-10px);

          transition: 0.3s ease;
        }

        .nav-menu.active {
          background: rgba(255, 255, 255, 0.92);
          border: 1px solid rgba(255, 255, 255, 0.35);
          opacity: 1;
          visibility: visible;
          transform: translateY(0);
        }

        .nav-item {
          width: 100%;
        }

        .nav-link {
          width: 100%;
          justify-content: space-between;
          padding: 10px 0;
        }

        .dropdown {
          position: relative;
          top: 0;
          margin-top: 10px;
          width: 100%;

          opacity: 1;
          visibility: visible;
          transform: none;

          display: none;
        }

        .nav-item.active .dropdown {
          background: rgba(255, 255, 255, 0.92);
          display: block;
        }
      }
    </style>
  </head>

  <body>
    <div class="navbar-wrapper">
      <nav class="navbar">
        <!-- LOGO -->
        <a href="https://apps.bem-unsoed.com/" class="logo">
          <img
            src="https://apps.bem-unsoed.com/wp-content/uploads/2022/04/BEM-Unsoed-2026-Kabinet-Kausa-Cipta-e1776928178777.png"
            alt="BEM Unsoed"
          />
        </a>

        <!-- MOBILE BUTTON -->
        <button
          class="menu-toggle"
          id="menuToggle"
          type="button"
          aria-label="Toggle menu"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 6H20" />
            <path d="M4 12H20" />
            <path d="M4 18H20" />
          </svg>
        </button>

        <!-- MENU -->
        <ul class="nav-menu" id="navMenu">
          <li class="nav-item">
            <a href="https://apps.bem-unsoed.com/" class="nav-link">
              Beranda
            </a>
          </li>

          <!-- PROFIL -->
          <li class="nav-item mobile-dropdown">
            <a href="#" class="nav-link">
              Profil
              <svg
                class="nav-caret"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </a>

            <div class="dropdown">
              <a href="https://apps.bem-unsoed.com/profile-kabinet/"
                >Profil Kabinet</a
              >
              <a href="https://apps.bem-unsoed.com/sejarah-bem-unsoed/"
                >Sejarah BEM Unsoed</a
              >
            </div>
          </li>

          <!-- LAYANAN -->
          <li class="nav-item mobile-dropdown">
            <a href="#" class="nav-link">
              Layanan Mahasiswa
              <svg
                class="nav-caret"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </a>

            <div class="dropdown">
              <a href="https://apps.bem-unsoed.com/faq/">Tanya Jawab</a>
              <a href="https://apps.bem-unsoed.com/kalender-kbmu/"
                >Monthly Calendar</a
              >
              <a href="https://apps.bem-unsoed.com/manual/">Manual</a>
              <a href="https://apps.bem-unsoed.com/ruang-peluang/"
                >Ruang Peluang</a
              >
            </div>
          </li>

          <!-- HUBUNGI -->
          <li class="nav-item mobile-dropdown">
            <a href="#" class="nav-link">
              Hubungi Kami
              <svg
                class="nav-caret"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </a>

            <div class="dropdown">
              <a href="https://apps.bem-unsoed.com/media-partner/"
                >Media Partner</a
              >
              <a href="https://apps.bem-unsoed.com/partnership/">Partnership</a>
              <a href="https://apps.bem-unsoed.com/contact/">Kontak</a>
            </div>
          </li>
        </ul>
      </nav>
    </div>

    <script>
      // NAVBAR SHRINK ON SCROLL
      const navbarWrapper = document.querySelector(".navbar-wrapper");
      const setNavbarScrollState = () => {
        if (!navbarWrapper) return;
        navbarWrapper.classList.toggle("is-scrolled", window.scrollY > 8);
      };

      setNavbarScrollState();
      window.addEventListener("scroll", setNavbarScrollState, {
        passive: true,
      });

      // MOBILE MENU
      const menuToggle = document.getElementById("menuToggle");
      const navMenu = document.getElementById("navMenu");

      menuToggle.addEventListener("click", () => {
        navMenu.classList.toggle("active");
      });

      // MOBILE DROPDOWN (only one open at a time)
      const mobileDropdowns = document.querySelectorAll(".mobile-dropdown");

      mobileDropdowns.forEach((item) => {
        const trigger = item.querySelector(".nav-link");
        if (!trigger) return;

        trigger.addEventListener("click", (event) => {
          if (window.innerWidth > 992) return;

          event.preventDefault();

          const wasActive = item.classList.contains("active");
          mobileDropdowns.forEach((other) => other.classList.remove("active"));
          if (!wasActive) item.classList.add("active");
        });
      });
    </script>
  </body>
</html>
